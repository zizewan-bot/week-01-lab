<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JS Practice</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
    }

    button {
      cursor: pointer;
      padding: 8px 16px;
      margin: 4px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }

    #count-display {
      font-size: 2rem;
      font-weight: bold;
      margin: 16px 0;
    }

    #todo-list {
      list-style: none;
      padding: 0;
    }

    #todo-list li {
      padding: 8px;
      border-bottom: 1px solid #eee;
    }

    .todo-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    #todo-input {
      flex: 1;
      padding: 8px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>JS Practice Page</h1>

  <section>
    <h2>Counter</h2>
    <div id="count-display">0</div>
    <button id="increment-btn">+1</button>
    <button id="decrement-btn">-1</button>
    <button id="reset-btn">Reset</button>
  </section>

  <section>
    <h2>Quick To-Do List</h2>
    <div class="todo-row">
      <input type="text" id="todo-input" placeholder="Add a task..." />
      <button id="add-btn">Add</button>
    </div>
    <ul id="todo-list"></ul>
  </section>

  <script src="script.js"></script>
</body>
</html>
